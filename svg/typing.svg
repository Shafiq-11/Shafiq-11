<svg xmlns="http://www.w3.org/2000/svg" width="500" height="80" viewBox="0 0 500 80">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&amp;display=swap');
    
    text {
      font-family: 'Fira Code', monospace;
      font-size: 16px;
      fill: #00f0ff;
    }

    .cursor {
      fill: #bd00ff;
      animation: blink 0.8s infinite steps(2);
    }

    .text-line {
      opacity: 0;
      animation: type-sequence 18s infinite steps(1);
    }

    .line-1 { animation-delay: 0s; }
    .line-2 { animation-delay: 3s; }
    .line-3 { animation-delay: 6s; }
    .line-4 { animation-delay: 9s; }
    .line-5 { animation-delay: 12s; }
    .line-6 { animation-delay: 15s; }

    @keyframes blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    @keyframes type-sequence {
      0%, 16.66% { opacity: 1; }
      16.67%, 100% { opacity: 0; }
    }
  </style>

  <!-- Terminal border/background - simplified flat style -->
  <rect width="100%" height="100%" rx="8" fill="#0d0e15" stroke="#1c1f30" stroke-width="1.5" />
  
  <!-- Indicator dots -->
  <circle cx="20" cy="20" r="4" fill="#ff5f56" />
  <circle cx="32" cy="20" r="4" fill="#ffbd2e" />
  <circle cx="44" cy="20" r="4" fill="#27c93f" />

  <!-- Terminal Title -->
  <text x="250" y="24" font-size="11" fill="#7d8590" text-anchor="middle" font-weight="bold" opacity="0.6">
    shafiq@command-center:~
  </text>

  <!-- Shell Prompt Icon -->
  <text x="20" y="55" font-weight="bold" fill="#bd00ff">&gt;</text>

  <!-- Typing phrases -->
  <g transform="translate(40, 55)">
    <text class="text-line line-1" x="0" y="0">Full Stack Developer</text>
    <text class="text-line line-2" x="0" y="0" fill="#ffffff">React • Spring Boot • Java</text>
    <text class="text-line line-3" x="0" y="0">Building Products 🚀</text>
    <text class="text-line line-4" x="0" y="0" fill="#ffffff">Bike Entrepreneur 🏍</text>
    <text class="text-line line-5" x="0" y="0">Gym Discipline 💪</text>
    <text class="text-line line-6" x="0" y="0" fill="#ffffff">Open to Internships 💼</text>
    
    <!-- Flat Blinking Cursor -->
    <rect class="cursor" x="250" y="-14" width="8" height="16">
      <animate attributeName="x" 
               values="210;240;190;210;170;210" 
               dur="18s" 
               repeatCount="indefinite" 
               calcMode="discrete"/>
    </rect>
  </g>
</svg>
