<svg xmlns="http://www.w3.org/2000/svg" width="500" height="200" viewBox="0 0 500 200">
  <style>
    :root {
      --bg: #0b0f19;
      --border: #30363d;
      --card: #161b22;
      --text-main: #f0f6fc;
      --text-muted: #8b949e;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --border: #d1d5db;
        --card: #f6f8fa;
        --text-main: #1f2937;
        --text-muted: #4b5563;
      }
    }
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap');
    .panel {
      fill: var(--bg);
      stroke: var(--border);
      stroke-width: 1.5;
      rx: 8;
    }
    .widget-bg {
      fill: var(--card);
      stroke: var(--border);
      stroke-width: 1;
      rx: 6;
    }
    text {
      font-family: 'Outfit', sans-serif;
    }
    .title {
      font-weight: 700;
      font-size: 14px;
      fill: var(--text-main);
      letter-spacing: 0.5px;
    }
    .label {
      font-weight: 600;
      font-size: 12px;
      fill: var(--text-main);
    }
    .status {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .status-online {
      fill: #2ea44f;
    }
    .status-warning {
      fill: #dbab09;
    }
    .pulse-green {
      animation: glow-green 1.8s infinite ease-in-out;
    }
    .pulse-yellow {
      animation: glow-yellow 1.8s infinite ease-in-out;
    }
    @keyframes glow-green {
      0%, 100% { fill: #2ea44f; filter: drop-shadow(0 0 1px rgba(46,164,79,0.4)); }
      50% { fill: #56d364; filter: drop-shadow(0 0 6px rgba(86,211,100,0.8)); }
    }
    @keyframes glow-yellow {
      0%, 100% { fill: #dbab09; filter: drop-shadow(0 0 1px rgba(219,171,9,0.4)); }
      50% { fill: #f1e05a; filter: drop-shadow(0 0 6px rgba(241,224,90,0.8)); }
    }
  </style>
  <rect class="panel" width="498" height="198" x="1" y="1"/>
  
  <text class="title" x="25" y="32">🖥️ SYSTEM STATUS MONITOR</text>
  
  <!-- Grid of widgets -->
  <!-- Col 1, Row 1: Java -->
  <g transform="translate(25, 52)">
    <rect class="widget-bg" width="140" height="42" />
    <circle class="pulse-green" cx="20" cy="21" r="5" />
    <text class="label" x="35" y="20">Java Core</text>
    <text class="status status-online" x="35" y="33">ONLINE</text>
  </g>
  
  <!-- Col 2, Row 1: React -->
  <g transform="translate(180, 52)">
    <rect class="widget-bg" width="140" height="42" />
    <circle class="pulse-green" cx="20" cy="21" r="5" />
    <text class="label" x="35" y="20">React UI</text>
    <text class="status status-online" x="35" y="33">ONLINE</text>
  </g>
  
  <!-- Col 3, Row 1: Spring Boot -->
  <g transform="translate(335, 52)">
    <rect class="widget-bg" width="140" height="42" />
    <circle class="pulse-green" cx="20" cy="21" r="5" />
    <text class="label" x="35" y="20">Spring Boot</text>
    <text class="status status-online" x="35" y="33">ONLINE</text>
  </g>
  
  <!-- Col 1, Row 2: GitHub -->
  <g transform="translate(25, 115)">
    <rect class="widget-bg" width="140" height="42" />
    <circle class="pulse-green" cx="20" cy="21" r="5" />
    <text class="label" x="35" y="20">GitHub VCS</text>
    <text class="status status-online" x="35" y="33">ONLINE</text>
  </g>
  
  <!-- Col 2, Row 2: Fitness -->
  <g transform="translate(180, 115)">
    <rect class="widget-bg" width="140" height="42" />
    <circle class="pulse-green" cx="20" cy="21" r="5" />
    <text class="label" x="35" y="20">Discipline</text>
    <text class="status status-online" x="35" y="33">ACTIVE</text>
  </g>
  
  <!-- Col 3, Row 2: Coffee -->
  <g transform="translate(335, 115)">
    <rect class="widget-bg" width="140" height="42" />
    <circle class="pulse-yellow" cx="20" cy="21" r="5" />
    <text class="label" x="35" y="20">Coffee Fuel</text>
    <text class="status status-warning" x="35" y="33">NEEDED</text>
  </g>
</svg>
