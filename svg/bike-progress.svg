<svg xmlns="http://www.w3.org/2000/svg" width="400" height="110" viewBox="0 0 400 110">
  <defs>
    <linearGradient id="path-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bd00ff" />
      <stop offset="50%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#00ff66" />
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bd00ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00f0ff" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0d14" />
      <stop offset="100%" stop-color="#05060a" />
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap');
    .title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 13px;
      fill: #ffffff;
      letter-spacing: 0.8px;
    }
    .desc {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 11px;
      fill: #a0a5c0;
    }
    .stat {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 11px;
      fill: #00f0ff;
    }
    .card-border {
      stroke: url(#border-grad);
      stroke-width: 1.5;
      fill: url(#bg-grad);
      rx: 12;
    }
    .path-bg {
      stroke: #141724;
      stroke-width: 4;
      stroke-linecap: round;
    }
    .path-fill {
      stroke: url(#path-grad);
      stroke-width: 4;
      stroke-linecap: round;
      filter: url(#neon);
    }
    .bike-icon {
      font-size: 16px;
      animation: bounce 2s infinite ease-in-out;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-2px); }
    }
  </style>

  <rect class="card-border" width="398" height="108" x="1" y="1" />

  <!-- Header -->
  <text class="title" x="20" y="28">🏍 REBORN MOTORS PROGRESS TRACK</text>
  <text class="stat" x="380" y="28" text-anchor="end">780 / 1000 KM</text>

  <!-- Track Line -->
  <g transform="translate(20, 50)">
    <line class="path-bg" x1="10" y1="15" x2="350" y2="15" />
    <line class="path-fill" x1="10" y1="15" x2="275" y2="15" />
    
    <!-- Start Flag -->
    <text x="0" y="20" font-size="12">🏡</text>
    
    <!-- End Flag -->
    <text x="350" y="20" font-size="12">🏁</text>
    
    <!-- Bike Marker -->
    <g transform="translate(275, 0)">
      <text class="bike-icon" x="-10" y="13">🏍</text>
      <text x="-4" y="28" font-size="9" fill="#00ff66" font-family="'Outfit', sans-serif" font-weight="bold" text-anchor="middle">78%</text>
    </g>
  </g>
  
  <text class="desc" x="20" y="98">Current Status: <tspan fill="#00ff66" font-weight="bold">Cruising</tspan></text>
</svg>