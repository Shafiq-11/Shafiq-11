<svg xmlns="http://www.w3.org/2000/svg" width="500" height="400" viewBox="0 0 500 400">
  <style>
    :root {
      --bg: #0b0f19;
      --border: #30363d;
      --grid: #1c2230;
      --accent: #818cf8;
      --text-main: #f0f6fc;
      --poly-fill: rgba(129, 140, 248, 0.3);
      --poly-stroke: #818cf8;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --border: #d1d5db;
        --grid: #e5e7eb;
        --accent: #4f46e5;
        --text-main: #1f2937;
        --poly-fill: rgba(79, 70, 229, 0.2);
        --poly-stroke: #4f46e5;
      }
    }
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&amp;display=swap');
    .card {
      fill: var(--bg);
      stroke: var(--border);
      stroke-width: 1.5;
      rx: 8;
    }
    .grid-line {
      stroke: var(--grid);
      stroke-width: 1;
    }
    .grid-ring {
      fill: none;
      stroke: var(--grid);
      stroke-width: 1;
    }
    .axis-label {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 12px;
      fill: var(--text-main);
      text-anchor: middle;
    }
    .radar-poly {
      fill: var(--poly-fill);
      stroke: var(--poly-stroke);
      stroke-width: 2;
      transform-origin: 250px 200px;
      animation: radar-expand 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .radar-node {
      fill: var(--bg);
      stroke: var(--poly-stroke);
      stroke-width: 2;
      transform-origin: 250px 200px;
      animation: node-expand 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    .title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 14px;
      fill: var(--text-main);
      letter-spacing: 0.5px;
    }
    @keyframes radar-expand {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    @keyframes node-expand {
      from { transform: scale(0); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
  </style>
  <rect class="card" width="498" height="398" x="1" y="1" />
  
  <text class="title" x="25" y="32">📊 SKILL RADAR CHART</text>
  
  <!-- Outer Web -->
  <g>
    <!-- Axis lines -->
    <line class="grid-line" x1="250" y1="200" x2="250" y2="80" />
    <line class="grid-line" x1="250" y1="200" x2="354" y2="140" />
    <line class="grid-line" x1="250" y1="200" x2="354" y2="260" />
    <line class="grid-line" x1="250" y1="200" x2="250" y2="320" />
    <line class="grid-line" x1="250" y1="200" x2="146" y2="260" />
    <line class="grid-line" x1="250" y1="200" x2="146" y2="140" />
    
    <!-- Concentric Hexagons -->
    <!-- 25% Ring -->
    <polygon class="grid-ring" points="250,170 276,185 276,215 250,230 224,215 224,185" />
    <!-- 50% Ring -->
    <polygon class="grid-ring" points="250,140 302,170 302,230 250,260 198,230 198,170" />
    <!-- 75% Ring -->
    <polygon class="grid-ring" points="250,110 328,155 328,245 250,290 172,245 172,155" />
    <!-- 100% Ring -->
    <polygon class="grid-ring" points="250,80 354,140 354,260 250,320 146,260 146,140" />
  </g>
  
  <!-- Skill area (animated scale) -->
  <polygon class="radar-poly" points="250,92 323,158 338,251 250,296 156,254 162,149" />
  
  <!-- Nodes (scale along with radar poly) -->
  <circle class="radar-node" cx="250" cy="92" r="4" />
  <circle class="radar-node" cx="323" cy="158" r="4" />
  <circle class="radar-node" cx="338" cy="251" r="4" />
  <circle class="radar-node" cx="250" cy="296" r="4" />
  <circle class="radar-node" cx="156" cy="254" r="4" />
  <circle class="radar-node" cx="162" cy="149" r="4" />
  
  <!-- Labels -->
  <text class="axis-label" x="250" y="68">Java</text>
  <text class="axis-label" x="385" y="138">System Design</text>
  <text class="axis-label" x="385" y="275">Spring Boot</text>
  <text class="axis-label" x="250" y="340">Database</text>
  <text class="axis-label" x="110" y="275">React</text>
  <text class="axis-label" x="120" y="138">DSA</text>
</svg>
