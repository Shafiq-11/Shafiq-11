<svg xmlns="http://www.w3.org/2000/svg" width="800" height="260" viewBox="0 0 800 260">
  <style>
    :root {
      --bg: #0b0f19;
      --border: #818cf8;
      --accent: #818cf8;
      --text-main: #f0f6fc;
      --text-dim: #6e7681;
      --bar-fill: #818cf8;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f6f8fa;
        --border: #4f46e5;
        --accent: #4f46e5;
        --text-main: #1f2937;
        --text-dim: #6b7280;
        --bar-fill: #4f46e5;
      }
    }
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&amp;display=swap');
    .screen {
      fill: var(--bg);
      stroke: var(--border);
      stroke-width: 1.5;
      rx: 8;
    }
    text {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      fill: var(--text-main);
    }
    .dim {
      fill: var(--text-dim);
    }
    .accent {
      fill: var(--accent);
      font-weight: bold;
    }
    .loader-bg {
      fill: #161b22;
      rx: 2;
    }
    @media (prefers-color-scheme: light) {
      .loader-bg { fill: #e5e7eb; }
    }
    .loader-fill {
      fill: var(--bar-fill);
      rx: 2;
    }
    .line { opacity: 0; }
    
    .line-1 { animation: show-line 0s forwards; }
    .line-2 { animation: show-line 0.6s forwards; }
    .line-3 { animation: show-line 1.4s forwards; }
    .line-4 { animation: show-line 2.2s forwards; }
    .line-5 { animation: show-line 3.0s forwards; }
    .line-6 { animation: show-line 3.8s forwards; }
    
    .bar-java { animation: fill-bar 0.6s 0.8s ease-in-out forwards; }
    .bar-react { animation: fill-bar 0.6s 1.6s ease-in-out forwards; }
    .bar-spring { animation: fill-bar 0.6s 2.4s ease-in-out forwards; }
    .bar-projects { animation: fill-bar 0.6s 3.2s ease-in-out forwards; }
    
    @keyframes show-line {
      to { opacity: 1; }
    }
    @keyframes fill-bar {
      from { width: 0; }
      to { width: 100px; }
    }
  </style>
  <rect class="screen" width="798" height="258" x="1" y="1"/>
  
  <g transform="translate(30, 40)">
    <text x="0" y="0" class="accent line-1">Booting Developer OS v2.0.6...</text>
    
    <g transform="translate(0, 25)" class="line-2">
      <text x="0" y="12">Loading Java Core...</text>
      <rect class="loader-bg" x="220" y="2" width="100" height="10" />
      <rect class="loader-fill bar-java" x="220" y="2" width="0" height="10" />
      <text x="330" y="12" class="accent">[ 100% ]</text>
    </g>
    
    <g transform="translate(0, 55)" class="line-3">
      <text x="0" y="12">Loading React Ecosystem...</text>
      <rect class="loader-bg" x="220" y="2" width="100" height="10" />
      <rect class="loader-fill bar-react" x="220" y="2" width="0" height="10" />
      <text x="330" y="12" class="accent">[ 100% ]</text>
    </g>
    
    <g transform="translate(0, 85)" class="line-4">
      <text x="0" y="12">Loading Spring Boot...</text>
      <rect class="loader-bg" x="220" y="2" width="100" height="10" />
      <rect class="loader-fill bar-spring" x="220" y="2" width="0" height="10" />
      <text x="330" y="12" class="accent">[ 100% ]</text>
    </g>
    
    <g transform="translate(0, 115)" class="line-5">
      <text x="0" y="12">Loading System Modules...</text>
      <rect class="loader-bg" x="220" y="2" width="100" height="10" />
      <rect class="loader-fill bar-projects" x="220" y="2" width="0" height="10" />
      <text x="330" y="12" class="accent">[ 100% ]</text>
    </g>
    
    <path d="M 0 150 L 740 150" stroke="var(--border)" stroke-width="1.5" stroke-dasharray="4 4" class="line-6" opacity="0.3"/>
    
    <text x="0" y="185" font-size="18" font-weight="bold" class="accent line-6">Welcome to Shafiq Ahamed Developer Command Center</text>
    <text x="0" y="205" class="dim line-6">> System ready. Open for Internship opportunities.</text>
  </g>
</svg>
