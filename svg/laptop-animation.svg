<svg xmlns="http://www.w3.org/2000/svg" width="500" height="350" viewBox="0 0 500 350">
  <style>
    :root {
      --bg: #0b0f19;
      --border: #30363d;
      --accent: #818cf8;
      --laptop-bezel: #2d3748;
      --laptop-base: #4a5568;
      --laptop-base-dark: #1a202c;
      --code-yellow: #dbab09;
      --code-green: #2ea44f;
      --code-blue: #58a6ff;
      --code-white: #f0f6fc;
      --code-gray: #8b949e;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --border: #d1d5db;
        --accent: #4f46e5;
        --laptop-bezel: #4b5563;
        --laptop-base: #9ca3af;
        --laptop-base-dark: #374151;
        --code-yellow: #a15c00;
        --code-green: #117e30;
        --code-blue: #0969da;
        --code-white: #1f2937;
        --code-gray: #6b7280;
      }
    }
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&amp;display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@700&amp;display=swap');
    
    .card-border {
      fill: none;
      stroke: var(--border);
      stroke-width: 1.5;
      rx: 8;
    }
    .laptop-screen {
      fill: #0d1117;
      rx: 4;
    }
    .screen-group {
      opacity: 0;
      animation: screen-cycle 16s infinite ease-in-out;
    }
    
    .screen-1 { animation-delay: 0s; }
    .screen-2 { animation-delay: 4s; }
    .screen-3 { animation-delay: 8s; }
    .screen-4 { animation-delay: 12s; }
    
    @keyframes screen-cycle {
      0%, 20% { opacity: 1; }
      25%, 95% { opacity: 0; }
      100% { opacity: 1; }
    }
    
    .code-text {
      font-family: 'Fira Code', monospace;
      font-size: 8px;
    }
    .yellow { fill: #dbab09; }
    .blue { fill: #58a6ff; }
    .green { fill: #56d364; }
    .white { fill: #f0f6fc; }
    .gray { fill: #8b949e; }
    
    @media (prefers-color-scheme: light) {
      .yellow { fill: #b45309; }
      .blue { fill: #1d4ed8; }
      .green { fill: #15803d; }
      .white { fill: #1f2937; }
      .gray { fill: #4b5563; }
    }
  </style>
  
  <rect class="card-border" width="498" height="348" x="1" y="1" />
  
  <g transform="translate(0, 10)">
    <!-- Laptop Chassis Base -->
    <polygon points="50,250 450,250 470,270 30,270" fill="var(--laptop-base)" stroke="var(--border)" stroke-width="1.5" />
    <path d="M 210 250 L 290 250 A 6 6 0 0 1 296 256 L 296 258 L 204 258 L 204 256 A 6 6 0 0 1 210 250 Z" fill="var(--laptop-base-dark)" />
    <rect x="215" y="254" width="70" height="12" rx="2" fill="var(--laptop-base-dark)" />
    
    <!-- Laptop Screen Outer Lid -->
    <rect x="75" y="30" width="350" height="220" rx="8" fill="var(--laptop-bezel)" />
    <!-- Screen Bezel Dot (Webcam) -->
    <circle cx="250" cy="38" r="2" fill="#000000" />
    <circle cx="250" cy="38" r="0.5" fill="#58a6ff" />
    
    <!-- Inner Screen Display -->
    <rect class="laptop-screen" x="85" y="46" width="330" height="194" />
    
    <!-- Loop 1: Java Code Screen -->
    <g class="screen-group screen-1" transform="translate(95, 56)">
      <!-- Mini IDE Header -->
      <circle cx="5" cy="5" r="2.5" fill="#ff5f56" />
      <circle cx="13" cy="5" r="2.5" fill="#ffbd2e" />
      <circle cx="21" cy="5" r="2.5" fill="#27c93f" />
      <text class="code-text gray" x="35" y="8">DeveloperOS.java</text>
      
      <!-- Code lines -->
      <g transform="translate(5, 25)">
        <text class="code-text blue" x="0" y="10">public class <tspan class="white">DeveloperOS</tspan> {</text>
        
        <text class="code-text blue" x="12" y="22">public static void <tspan class="yellow">main</tspan><tspan class="white">(String[] args) {</tspan></text>
        <text class="code-text gray" x="24" y="34">// Initialize the stack</text>
        <text class="code-text white" x="24" y="46">Developer shafiq = <tspan class="blue">new</tspan> Developer();</text>
        <text class="code-text white" x="24" y="58">shafiq.<tspan class="yellow">setRole</tspan>(<tspan class="green">"Full Stack"</tspan>);</text>
        <text class="code-text white" x="24" y="70">shafiq.<tspan class="yellow">addSkill</tspan>(<tspan class="green">"Java"</tspan>, <tspan class="green">"Spring Boot"</tspan>);</text>
        <text class="code-text white" x="24" y="82">shafiq.<tspan class="yellow">setOpenToOpportunities</tspan>(<tspan class="blue">true</tspan>);</text>
        
        <text class="code-text white" x="24" y="98">System.out.<tspan class="yellow">println</tspan>(shafiq.<tspan class="yellow">getStatus</tspan>());</text>
        <text class="code-text white" x="12" y="110">}</text>
        <text class="code-text white" x="0" y="122">}</text>
      </g>
    </g>
    
    <!-- Loop 2: React Code Screen -->
    <g class="screen-group screen-2" transform="translate(95, 56)">
      <!-- Mini IDE Header -->
      <circle cx="5" cy="5" r="2.5" fill="#ff5f56" />
      <circle cx="13" cy="5" r="2.5" fill="#ffbd2e" />
      <circle cx="21" cy="5" r="2.5" fill="#27c93f" />
      <text class="code-text gray" x="35" y="8">Dashboard.jsx</text>
      
      <!-- Code lines -->
      <g transform="translate(5, 25)">
        <text class="code-text blue" x="0" y="10">import <tspan class="white">React, { useState }</tspan> from <tspan class="green">'react'</tspan>;</text>
        <text class="code-text blue" x="0" y="22">import <tspan class="white">{ SkillsRadar }</tspan> from <tspan class="green">'./charts'</tspan>;</text>
        
        <text class="code-text blue" x="0" y="38">const <tspan class="yellow">Dashboard</tspan> = <tspan class="white">() =&gt; {</tspan></text>
        <text class="code-text blue" x="12" y="50">const <tspan class="white">[booted, setBooted]</tspan> = <tspan class="yellow">useState</tspan><tspan class="white">(</tspan><tspan class="blue">false</tspan><tspan class="white">);</tspan></text>
        
        <text class="code-text blue" x="12" y="66">return <tspan class="white">(</tspan></text>
        <text class="code-text blue" x="20" y="78">&lt;<tspan class="green">div</tspan> className=<tspan class="green">"terminal-window"</tspan>&gt;</text>
        <text class="code-text blue" x="32" y="90">&lt;<tspan class="green">h1</tspan>&gt;<tspan class="white">Shafiq Ahamed OS</tspan>&lt;/<tspan class="green">h1</tspan>&gt;</text>
        <text class="code-text blue" x="32" y="102">&lt;<tspan class="yellow">SkillsRadar</tspan> animate={<tspan class="blue">true</tspan>} /&gt;</text>
        <text class="code-text blue" x="20" y="114">&lt;/<tspan class="green">div</tspan>&gt;</text>
        <text class="code-text blue" x="12" y="126">);</text>
        <text class="code-text white" x="0" y="138">};</text>
      </g>
    </g>
    
    <!-- Loop 3: Terminal Screen -->
    <g class="screen-group screen-3" transform="translate(95, 56)">
      <!-- Mini Terminal Header -->
      <circle cx="5" cy="5" r="2.5" fill="#ff5f56" />
      <circle cx="13" cy="5" r="2.5" fill="#ffbd2e" />
      <circle cx="21" cy="5" r="2.5" fill="#27c93f" />
      <text class="code-text gray" x="35" y="8">bash - shafiq@os:~</text>
      
      <!-- Terminal content -->
      <g transform="translate(5, 25)">
        <text class="code-text green" x="0" y="10">shafiq@os:~$ <tspan class="white">whoami</tspan></text>
        <text class="code-text white" x="0" y="20">Shafiq Ahamed - Full Stack Developer</text>
        
        <text class="code-text green" x="0" y="35">shafiq@os:~$ <tspan class="white">npm run dev</tspan></text>
        <text class="code-text gray" x="0" y="45">&gt; shafiq-portfolio@3.0.0 dev</text>
        <text class="code-text gray" x="0" y="53">&gt; vite</text>
        
        <text class="code-text green" x="0" y="65">  Local:   <tspan class="blue">http://localhost:5173/</tspan></text>
        <text class="code-text gray" x="0" y="73">  press h + enter to show help</text>
        
        <text class="code-text green" x="0" y="88">shafiq@os:~$ <tspan class="white">curl -s leetcode.com/u/Shafiqahamed</tspan></text>
        <text class="code-text yellow" x="0" y="98">Solved: 84 | Ranking: 1,797,243</text>
        
        <text class="code-text green" x="0" y="112">shafiq@os:~$ <tspan class="white">|</tspan></text>
        <rect x="72" y="105" width="4" height="8" fill="#56d364" />
      </g>
    </g>
    
    <!-- Loop 4: Portfolio Landing Screen -->
    <g class="screen-group screen-4" transform="translate(95, 56)">
      <!-- Browser window headers -->
      <circle cx="5" cy="5" r="2.5" fill="#ff5f56" />
      <circle cx="13" cy="5" r="2.5" fill="#ffbd2e" />
      <circle cx="21" cy="5" r="2.5" fill="#27c93f" />
      <!-- URL Bar -->
      <rect x="35" y="0" width="180" height="10" rx="3" fill="#161b22" stroke="var(--border)" stroke-width="0.5" />
      <text class="code-text gray" x="40" y="8" font-size="6px">https://portfolio-shafiq.vercel.app/</text>
      
      <!-- Mock UI layout -->
      <g transform="translate(5, 20)">
        <!-- Nav bar -->
        <rect x="0" y="0" width="310" height="15" rx="2" fill="#161b22" />
        <circle cx="15" cy="7" r="4" fill="var(--accent)" />
        <line x1="220" y1="7" x2="240" y2="7" stroke="var(--code-gray)" stroke-width="1.5" />
        <line x1="250" y1="7" x2="270" y2="7" stroke="var(--code-gray)" stroke-width="1.5" />
        <line x1="280" y1="7" x2="300" y2="7" stroke="var(--code-gray)" stroke-width="1.5" />
        
        <!-- Hero section -->
        <text x="15" y="40" font-family="'Outfit', sans-serif" font-weight="700" font-size="12px" fill="var(--code-white)">HI, I'M SHAFIQ AHAMED</text>
        <text x="15" y="52" font-size="6px" fill="var(--code-gray)">Building clean architectures with Java, Spring Boot, and React.</text>
        
        <!-- Call to Action button -->
        <rect x="15" y="60" width="45" height="12" rx="2" fill="var(--accent)" />
        <text x="37.5" y="68" font-size="5px" fill="#ffffff" text-anchor="middle">View Projects</text>
        
        <!-- Cards mockup -->
        <g transform="translate(15, 82)">
          <rect x="0" y="0" width="80" height="50" rx="4" fill="#161b22" stroke="var(--border)" stroke-width="0.5" />
          <circle cx="15" cy="12" r="5" fill="#f1e05a" />
          <line x1="25" y1="12" x2="65" y2="12" stroke="var(--code-white)" stroke-width="1.5" />
          <line x1="10" y1="28" x2="70" y2="28" stroke="var(--code-gray)" stroke-width="1" />
          <line x1="10" y1="36" x2="50" y2="36" stroke="var(--code-gray)" stroke-width="1" />
          
          <rect x="90" y="0" width="80" height="50" rx="4" fill="#161b22" stroke="var(--border)" stroke-width="0.5" />
          <circle cx="105" cy="12" r="5" fill="#b07219" />
          <line x1="115" y1="12" x2="155" y2="12" stroke="var(--code-white)" stroke-width="1.5" />
          <line x1="100" y1="28" x2="160" y2="28" stroke="var(--code-gray)" stroke-width="1" />
          <line x1="100" y1="36" x2="140" y2="36" stroke="var(--code-gray)" stroke-width="1" />
          
          <rect x="180" y="0" width="80" height="50" rx="4" fill="#161b22" stroke="var(--border)" stroke-width="0.5" />
          <circle cx="195" cy="12" r="5" fill="#3178c6" />
          <line x1="205" y1="12" x2="245" y2="12" stroke="var(--code-white)" stroke-width="1.5" />
          <line x1="190" y1="28" x2="250" y2="28" stroke="var(--code-gray)" stroke-width="1" />
          <line x1="190" y1="36" x2="230" y2="36" stroke="var(--code-gray)" stroke-width="1" />
        </g>
      </g>
    </g>
  </g>
</svg>
