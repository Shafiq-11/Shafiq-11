<svg xmlns="http://www.w3.org/2000/svg" width="800" height="20" viewBox="0 0 800 20">
  <defs>
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0" />
      <stop offset="15%" stop-color="#818cf8" stop-opacity="1" />
      <stop offset="50%" stop-color="#c084fc" stop-opacity="1" />
      <stop offset="85%" stop-color="#818cf8" stop-opacity="1" />
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <line x1="10" y1="10" x2="790" y2="10" stroke="url(#neon-grad)" stroke-width="2" filter="url(#glow)" />
</svg>
