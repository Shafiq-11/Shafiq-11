<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#7000ff" />
    </linearGradient>
    <linearGradient id="purple-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bd00ff" />
      <stop offset="100%" stop-color="#ff0055" />
    </linearGradient>
    <linearGradient id="green-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00ff66" />
      <stop offset="100%" stop-color="#00f0ff" />
    </linearGradient>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#bd00ff" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0d14" />
      <stop offset="100%" stop-color="#05060a" />
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap');
    .title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 15px;
      fill: #ffffff;
      letter-spacing: 1px;
    }
    .subtitle {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 11px;
      fill: #ff0055;
    }
    .label {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 13px;
      fill: #a0a5c0;
    }
    .percent {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 13px;
      fill: #ffffff;
      text-anchor: end;
    }
    .card-border {
      stroke: url(#border-grad);
      stroke-width: 1.5;
      fill: url(#bg-grad);
      rx: 12;
    }
    .progress-bg {
      fill: #141724;
      rx: 3;
    }
  </style>

  <rect class="card-border" width="398" height="248" x="1" y="1" />
  
  <!-- Header -->
  <text class="title" x="25" y="35">⚡ PROJECT 50 CONTROL PANEL</text>
  <text class="subtitle" x="375" y="35" text-anchor="end" filter="url(#neon)">DAY 45/50</text>
  
  <line x1="25" y1="48" x2="375" y2="48" stroke="#1c1f30" stroke-width="1"/>

  <!-- Coding -->
  <g transform="translate(25, 60)">
    <text class="label" x="0" y="15">Coding</text>
    <text class="percent" x="350" y="15">92%</text>
    <rect class="progress-bg" x="0" y="24" width="350" height="8" />
    <rect x="0" y="24" width="322" height="8" rx="3" fill="url(#blue-grad)" filter="url(#neon)"/>
  </g>

  <!-- DSA -->
  <g transform="translate(25, 95)">
    <text class="label" x="0" y="15">DSA Practice</text>
    <text class="percent" x="350" y="15">86%</text>
    <rect class="progress-bg" x="0" y="24" width="350" height="8" />
    <rect x="0" y="24" width="301" height="8" rx="3" fill="url(#purple-grad)" filter="url(#neon)"/>
  </g>

  <!-- Gym -->
  <g transform="translate(25, 130)">
    <text class="label" x="0" y="15">Gym Consistency</text>
    <text class="percent" x="350" y="15">100%</text>
    <rect class="progress-bg" x="0" y="24" width="350" height="8" />
    <rect x="0" y="24" width="350" height="8" rx="3" fill="url(#green-grad)" filter="url(#neon)"/>
  </g>

  <!-- Projects -->
  <g transform="translate(25, 165)">
    <text class="label" x="0" y="15">Build Projects</text>
    <text class="percent" x="350" y="15">90%</text>
    <rect class="progress-bg" x="0" y="24" width="350" height="8" />
    <rect x="0" y="24" width="315" height="8" rx="3" fill="url(#blue-grad)" filter="url(#neon)"/>
  </g>

  <!-- Learning -->
  <g transform="translate(25, 200)">
    <text class="label" x="0" y="15">Continuous Learning</text>
    <text class="percent" x="350" y="15">95%</text>
    <rect class="progress-bg" x="0" y="24" width="350" height="8" />
    <rect x="0" y="24" width="332" height="8" rx="3" fill="url(#purple-grad)" filter="url(#neon)"/>
  </g>
</svg>