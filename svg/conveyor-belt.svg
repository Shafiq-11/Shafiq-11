<svg xmlns="http://www.w3.org/2000/svg" width="800" height="70" viewBox="0 0 800 70">
  <style>
    :root {
      --bg: #0b0f19;
      --border: #30363d;
      --accent: #818cf8;
      --text: #f0f6fc;
      --badge-bg: #161b22;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --border: #d1d5db;
        --accent: #4f46e5;
        --text: #1f2937;
        --badge-bg: #f6f8fa;
      }
    }
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600&amp;display=swap');
    .badge {
      fill: var(--badge-bg);
      stroke: var(--border);
      stroke-width: 1.5;
      rx: 16;
    }
    .badge:hover {
      stroke: var(--accent);
    }
    text {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 12px;
      fill: var(--text);
      text-anchor: middle;
    }
    .conveyor {
      animation: scroll 20s linear infinite;
    }
    .conveyor:hover {
      animation-play-state: paused;
    }
    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-1080px); }
    }
  </style>
  
  <rect width="800" height="70" fill="none" />
  
  <g class="conveyor">
    <!-- Set 1 -->
    <g transform="translate(0, 0)">
      <g transform="translate(10, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">React</text>
      </g>
      <g transform="translate(130, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">Spring Boot</text>
      </g>
      <g transform="translate(250, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">Docker</text>
      </g>
      <g transform="translate(370, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">Git</text>
      </g>
      <g transform="translate(490, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">MySQL</text>
      </g>
      <g transform="translate(610, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">Java</text>
      </g>
      <g transform="translate(730, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">AWS</text>
      </g>
      <g transform="translate(850, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">Node.js</text>
      </g>
      <g transform="translate(970, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">MongoDB</text>
      </g>
    </g>
    
    <!-- Set 2 (Duplicate for seamless loop) -->
    <g transform="translate(1080, 0)">
      <g transform="translate(10, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">React</text>
      </g>
      <g transform="translate(130, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">Spring Boot</text>
      </g>
      <g transform="translate(250, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">Docker</text>
      </g>
      <g transform="translate(370, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">Git</text>
      </g>
      <g transform="translate(490, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">MySQL</text>
      </g>
      <g transform="translate(610, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">Java</text>
      </g>
      <g transform="translate(730, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">AWS</text>
      </g>
      <g transform="translate(850, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">Node.js</text>
      </g>
      <g transform="translate(970, 15)">
        <rect class="badge" width="100" height="32" />
        <text x="50" y="20">MongoDB</text>
      </g>
    </g>
  </g>
</svg>
