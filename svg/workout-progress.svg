<svg xmlns="http://www.w3.org/2000/svg" width="400" height="110" viewBox="0 0 400 110">
  <defs>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#bd00ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff0055" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0d14" />
      <stop offset="100%" stop-color="#05060a" />
    </linearGradient>
    <linearGradient id="bar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0055" />
      <stop offset="100%" stop-color="#bd00ff" />
    </linearGradient>
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap');
    .title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 13px;
      fill: #ffffff;
      letter-spacing: 0.8px;
    }
    .desc {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 11px;
      fill: #a0a5c0;
    }
    .stat {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 12px;
      fill: #ff0055;
    }
    .card-border {
      stroke: url(#border-grad);
      stroke-width: 1.5;
      fill: url(#bg-grad);
      rx: 12;
    }
  </style>

  <rect class="card-border" width="398" height="108" x="1" y="1" />

  <!-- Header -->
  <text class="title" x="20" y="28">💪 WORKOUT CONSISTENCY RADAR</text>
  <text class="stat" x="380" y="28" text-anchor="end" filter="url(#neon)">96% CONSISTENT</text>

  <!-- Consistency blocks representing workouts -->
  <g transform="translate(20, 42)">
    <!-- 10 blocks representing consistency -->
    <rect x="0" y="10" width="32" height="20" rx="4" fill="url(#bar-grad)" filter="url(#neon)"/>
    <rect x="36" y="10" width="32" height="20" rx="4" fill="url(#bar-grad)" filter="url(#neon)"/>
    <rect x="72" y="10" width="32" height="20" rx="4" fill="url(#bar-grad)" filter="url(#neon)"/>
    <rect x="108" y="10" width="32" height="20" rx="4" fill="url(#bar-grad)" filter="url(#neon)"/>
    <rect x="144" y="10" width="32" height="20" rx="4" fill="url(#bar-grad)" filter="url(#neon)"/>
    <rect x="180" y="10" width="32" height="20" rx="4" fill="url(#bar-grad)" filter="url(#neon)"/>
    <rect x="216" y="10" width="32" height="20" rx="4" fill="url(#bar-grad)" filter="url(#neon)"/>
    <rect x="252" y="10" width="32" height="20" rx="4" fill="url(#bar-grad)" filter="url(#neon)"/>
    <rect x="288" y="10" width="32" height="20" rx="4" fill="url(#bar-grad)" filter="url(#neon)"/>
    <rect x="324" y="10" width="32" height="20" rx="4" fill="#141724" />
  </g>

  <!-- Additional Stats -->
  <text class="desc" x="20" y="96">Sessions: <tspan fill="#ff0055" font-weight="bold">22 / month</tspan></text>
  <text class="desc" x="220" y="96">Current Streak: <tspan fill="#bd00ff" font-weight="bold">12 days</tspan></text>
</svg>