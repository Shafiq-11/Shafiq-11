<svg xmlns="http://www.w3.org/2000/svg" width="340" height="150" viewBox="0 0 340 150">
  <defs>
    <linearGradient id="border-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#bd00ff" />
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0c0d14" />
      <stop offset="100%" stop-color="#05060a" />
    </linearGradient>
    <filter id="neon-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap');
    .title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 18px;
      fill: #ffffff;
    }
    .desc {
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      font-size: 12px;
      fill: #a0a5c0;
    }
    .tag {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 10px;
      fill: #00f0ff;
    }
    .card-border {
      stroke: url(#border-grad);
      stroke-width: 1.5;
      fill: url(#bg-grad);
      rx: 12;
    }
  </style>

  <rect class="card-border" width="338" height="148" x="1" y="1" />

  <!-- Accent light -->
  <path d="M 280 1 L 327 1 A 12 12 0 0 1 339 13 L 339 40" stroke="url(#border-grad)" stroke-width="3" fill="none" filter="url(#neon-glow)" opacity="0.8"/>

  <!-- Logo Icon: Graduation cap / Certificate motif -->
  <g transform="translate(25, 25)" filter="url(#neon-glow)">
    <polygon points="15,4 27,11 15,18 3,11" stroke="#00f0ff" stroke-width="1.5" fill="none" />
    <path d="M 8 14.5 L 8 22 C 8 25 22 25 22 22 L 22 14.5" stroke="#bd00ff" stroke-width="1.5" fill="none" />
    <line x1="27" y1="11" x2="27" y2="20" stroke="#00f0ff" stroke-width="1.5" />
    <circle cx="27" cy="20" r="1.5" fill="#00f0ff" />
  </g>

  <text class="title" x="70" y="44">Student Portal</text>

  <text class="desc" x="25" y="78">Robust management system. Admin tools for course</text>
  <text class="desc" x="25" y="95">curriculums, grades, and profile configurations.</text>

  <rect x="25" y="115" width="40" height="18" rx="4" fill="#0d1f2d" stroke="#00f0ff" stroke-width="1" opacity="0.8"/>
  <text class="tag" x="45" y="127" text-anchor="middle">Java</text>

  <rect x="73" y="115" width="70" height="18" rx="4" fill="#1b122c" stroke="#bd00ff" stroke-width="1" opacity="0.8"/>
  <text class="tag" x="108" y="127" fill="#bd00ff" text-anchor="middle">Spring Boot</text>

  <rect x="151" y="115" width="55" height="18" rx="4" fill="#0d1f2d" stroke="#00f0ff" stroke-width="1" opacity="0.8"/>
  <text class="tag" x="178.5" y="127" text-anchor="middle">React JS</text>
</svg>
