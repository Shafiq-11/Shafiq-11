<svg xmlns="http://www.w3.org/2000/svg" width="340" height="130" viewBox="0 0 340 130">
  <style>
    :root {
      --bg: #0b0f19;
      --border: #30363d;
      --accent: #818cf8;
      --text-main: #f0f6fc;
      --text-muted: #8b949e;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --border: #d1d5db;
        --accent: #4f46e5;
        --text-main: #1f2937;
        --text-muted: #4b5563;
      }
    }
    @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&amp;display=swap');
    .card {
      fill: var(--bg);
      stroke: var(--border);
      stroke-width: 1.5;
      rx: 6;
      transition: all 0.3s ease;
    }
    svg:hover .card {
      stroke: var(--accent);
      filter: drop-shadow(0 0 6px var(--accent));
    }
    text {
      font-family: 'Fira Code', monospace;
      fill: var(--text-main);
    }
    .title {
      font-weight: 700;
      font-size: 14px;
      fill: var(--accent);
    }
    .accent-text {
      fill: var(--accent);
    }
    .white {
      fill: var(--text-main);
    }
    .dim-text {
      fill: var(--text-muted);
      font-size: 11px;
    }
    .bar {
      fill: var(--accent);
      opacity: 0.15;
      transition: all 0.3s ease;
    }
    svg:hover .bar {
      opacity: 0.4;
    }
  </style>
  <rect class="card" width="338" height="128" x="1" y="1" />
  
  <text class="title" x="20" y="28">┌─ maven-build-pipeline ──────────┐</text>
  
  <rect class="bar" x="20" y="38" width="300" height="4" rx="2" />
  
  <text class="dim-text" x="20" y="60">│ Status : <tspan class="accent-text" font-weight="bold">ACTIVE</tspan></text>
  <text class="dim-text" x="20" y="80">│ Tech   : <tspan class="white">Java + Spring Boot + Maven</tspan></text>
  <text class="dim-text" x="20" y="100">│ Link   : <tspan class="accent-text">View Repository →</tspan></text>
  
  <text class="title" x="20" y="118">└──────────────────────────┘</text>
</svg>