<svg xmlns="http://www.w3.org/2000/svg" width="800" height="150" viewBox="0 0 800 150">
  <style>
    :root {
      --bg: #0b0f19;
      --border: #30363d;
      --accent: #818cf8;
      --text: #f0f6fc;
      --card-bg: #161b22;
      --flow-color: #818cf8;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --border: #d1d5db;
        --accent: #4f46e5;
        --text: #1f2937;
        --card-bg: #f6f8fa;
        --flow-color: #4f46e5;
      }
    }
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700&amp;display=swap');
    .node-bg {
      fill: var(--card-bg);
      stroke: var(--border);
      stroke-width: 1.5;
      rx: 8;
    }
    .node-bg:hover {
      stroke: var(--accent);
    }
    text {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 11px;
      fill: var(--text);
      text-anchor: middle;
    }
    .subtext {
      font-size: 8px;
      fill: var(--text);
      opacity: 0.6;
    }
    .track-line {
      stroke: var(--border);
      stroke-width: 2;
      stroke-linecap: round;
    }
    .flow-line {
      stroke: var(--flow-color);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-dasharray: 8 12;
      animation: flow-animation 3s linear infinite;
    }
    @keyframes flow-animation {
      to { stroke-dashoffset: -40; }
    }
    .title {
      font-weight: 700;
      font-size: 14px;
      fill: var(--text);
      letter-spacing: 0.5px;
      text-anchor: start;
    }
  </style>
  
  <rect width="800" height="150" fill="none" />
  
  <!-- Connection tracks -->
  <line class="track-line" x1="110" y1="85" x2="710" y2="85" />
  
  <!-- Glowing flow lines -->
  <line class="flow-line" x1="110" y1="85" x2="710" y2="85" />
  
  <!-- Node 1: Users -->
  <g transform="translate(20, 60)">
    <rect class="node-bg" width="90" height="50" />
    <text x="45" y="24">👥 Users</text>
    <text class="subtext" x="45" y="38">Browsers / Clients</text>
  </g>
  
  <!-- Node 2: Frontend -->
  <g transform="translate(170, 60)">
    <rect class="node-bg" width="90" height="50" />
    <text x="45" y="24">💻 Frontend</text>
    <text class="subtext" x="45" y="38">React.js UI</text>
  </g>
  
  <!-- Node 3: Backend -->
  <g transform="translate(320, 60)">
    <rect class="node-bg" width="90" height="50" />
    <text x="45" y="24">⚙️ Backend</text>
    <text class="subtext" x="45" y="38">Spring Boot API</text>
  </g>
  
  <!-- Node 4: Database -->
  <g transform="translate(470, 60)">
    <rect class="node-bg" width="90" height="50" />
    <text x="45" y="24">🗄️ Database</text>
    <text class="subtext" x="45" y="38">MySQL / MongoDB</text>
  </g>
  
  <!-- Node 5: Deployment -->
  <g transform="translate(620, 60)">
    <rect class="node-bg" width="90" height="50" />
    <text x="45" y="24">🚀 Deployment</text>
    <text class="subtext" x="45" y="38">Docker / Vercel</text>
  </g>
</svg>
