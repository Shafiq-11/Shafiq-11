<svg xmlns="http://www.w3.org/2000/svg" width="500" height="190" viewBox="0 0 500 190">
  <style>
    :root {
      --bg: #0b0f19;
      --border: #30363d;
      --text-main: #f0f6fc;
      --text-muted: #8b949e;
      --accent: #818cf8;
      --card-bg: #161b22;
      --bar-bg: #21262d;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #ffffff;
        --border: #d1d5db;
        --text-main: #1f2937;
        --text-muted: #4b5563;
        --accent: #4f46e5;
        --card-bg: #f6f8fa;
        --bar-bg: #e5e7eb;
      }
    }
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&amp;display=swap');
    .card {
      fill: var(--bg);
      stroke: var(--border);
      stroke-width: 1.5;
      rx: 8;
    }
    .title {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 14px;
      fill: var(--text-main);
      letter-spacing: 0.5px;
    }
    .subtitle {
      font-family: 'Outfit', sans-serif;
      font-weight: 400;
      font-size: 11px;
      fill: var(--text-muted);
    }
    .num {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 28px;
      fill: var(--text-main);
    }
    .label {
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 11px;
      fill: var(--text-muted);
    }
    .val {
      font-family: 'Outfit', sans-serif;
      font-weight: 700;
      font-size: 12px;
      fill: var(--text-main);
      text-anchor: end;
    }
    .progress-bg {
      fill: var(--bar-bg);
      rx: 2;
    }
    .progress-easy { fill: #2ea44f; rx: 2; }
    .progress-medium { fill: #dbab09; rx: 2; }
    .progress-hard { fill: #d93535; rx: 2; }
    .divider {
      stroke: var(--border);
      stroke-width: 1;
    }
    .badge-container {
      fill: var(--card-bg);
      stroke: var(--border);
      stroke-width: 1;
      rx: 6;
    }
    .stat-box {
      fill: var(--card-bg);
      stroke: var(--border);
      stroke-width: 1;
      rx: 6;
    }
  </style>
  <rect class="card" width="498" height="188" x="1" y="1"/>
  
  <!-- Header -->
  <text class="title" x="25" y="32">🧠 LEETCODE METRICS</text>
  <text class="subtitle" x="475" y="32" text-anchor="end">Practice Dashboard</text>
  
  <line class="divider" x1="25" y1="44" x2="475" y2="44" />
  
  <!-- Solved Problems Column -->
  <g transform="translate(25, 55)">
    <text class="num" x="0" y="30">84</text>
    <text class="label" x="0" y="44">PROBLEMS SOLVED</text>
    
    <!-- Easy -->
    <g transform="translate(0, 58)">
      <text class="label" x="0" y="10">Easy</text>
      <text class="val" x="180" y="10">60 / 952</text>
      <rect class="progress-bg" x="0" y="16" width="180" height="4" />
      <rect class="progress-easy" x="0" y="16" width="11" height="4" />
    </g>
    
    <!-- Medium -->
    <g transform="translate(0, 86)">
      <text class="label" x="0" y="10">Medium</text>
      <text class="val" x="180" y="10">22 / 2079</text>
      <rect class="progress-bg" x="0" y="16" width="180" height="4" />
      <rect class="progress-medium" x="0" y="16" width="1" height="4" />
    </g>
    
    <!-- Hard -->
    <g transform="translate(0, 114)">
      <text class="label" x="0" y="10">Hard</text>
      <text class="val" x="180" y="10">2 / 950</text>
      <rect class="progress-bg" x="0" y="16" width="180" height="4" />
      <rect class="progress-hard" x="0" y="16" width="0" height="4" />
    </g>
  </g>
  
  <line class="divider" x1="240" y1="55" x2="240" y2="175" />
  
  <!-- Contest & Badges Column -->
  <g transform="translate(260, 55)">
    <!-- Contest rating / ranking box -->
    <g transform="translate(0, 0)">
      <rect class="stat-box" width="215" height="60" />
      <text class="label" x="15" y="22">GLOBAL RANKING</text>
      <text class="num" x="15" y="48" font-size="20" fill="var(--accent)">#1,802,830</text>
      <text class="label" x="200" y="22" text-anchor="end">REPUTATION</text>
      <text class="num" x="200" y="48" font-size="16" text-anchor="end" fill="var(--text-main)">0</text>
    </g>
    
    <!-- Badges box -->
    <g transform="translate(0, 68)">
      <rect class="badge-container" width="215" height="52" />
      <text class="label" x="15" y="18">BADGES</text>
      <!-- Dynamic Badge Icons -->
      <text class="subtitle" x="15" y="34" font-size="11" fill="var(--text-muted)">No badges unlocked yet</text>
    </g>
  </g>
</svg>