<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 6" width="100%" height="6px">
  <defs>
    <!-- Sleek, non-animated gradient -->
    <linearGradient id="divider-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bd00ff" stop-opacity="0" />
      <stop offset="15%" stop-color="#bd00ff" stop-opacity="0.6" />
      <stop offset="50%" stop-color="#00f0ff" stop-opacity="1" />
      <stop offset="85%" stop-color="#bd00ff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#bd00ff" stop-opacity="0" />
    </linearGradient>
  </defs>

  <!-- Clean, static line without glowing animations -->
  <path d="M 0 3 L 1000 3" stroke="url(#divider-grad)" stroke-width="1.5" />
</svg>
