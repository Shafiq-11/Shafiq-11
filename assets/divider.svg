<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 20" width="100%" height="20px">
  <defs>
    <!-- Cyberpunk Gradients -->
    <linearGradient id="divider-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#bd00ff" stop-opacity="0" />
      <stop offset="15%" stop-color="#bd00ff" stop-opacity="0.5" />
      <stop offset="50%" stop-color="#00f0ff" stop-opacity="1" />
      <stop offset="85%" stop-color="#bd00ff" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#bd00ff" stop-opacity="0" />
    </linearGradient>
    
    <!-- Neon Glow Filter -->
    <filter id="glow" x="-20%" y="-100%" width="140%" height="300%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .pulse-dot {
      animation: slide-pulse 4s infinite ease-in-out;
    }
    .main-line {
      animation: pulse-line 2s infinite ease-in-out;
    }
    @keyframes slide-pulse {
      0% { cx: 15%; opacity: 0.2; }
      50% { cx: 50%; opacity: 1; r: 5; }
      100% { cx: 85%; opacity: 0.2; }
    }
    @keyframes pulse-line {
      0%, 100% { stroke-width: 2; opacity: 0.8; }
      50% { stroke-width: 3; opacity: 1; }
    }
  </style>

  <!-- Background path (faint glow) -->
  <path d="M 0 10 L 1000 10" stroke="url(#divider-grad)" stroke-width="4" filter="url(#glow)" opacity="0.3"/>
  
  <!-- Main glowing line -->
  <path class="main-line" d="M 50 10 L 950 10" stroke="url(#divider-grad)" stroke-width="2" filter="url(#glow)"/>

  <!-- Tech notches -->
  <line x1="150" y1="5" x2="150" y2="15" stroke="#bd00ff" stroke-width="1.5" opacity="0.7"/>
  <line x1="850" y1="5" x2="850" y2="15" stroke="#bd00ff" stroke-width="1.5" opacity="0.7"/>
  
  <line x1="300" y1="7" x2="305" y2="10" stroke="#00f0ff" stroke-width="1" opacity="0.8"/>
  <line x1="305" y1="10" x2="300" y2="13" stroke="#00f0ff" stroke-width="1" opacity="0.8"/>

  <line x1="700" y1="7" x2="695" y2="10" stroke="#00f0ff" stroke-width="1" opacity="0.8"/>
  <line x1="695" y1="10" x2="700" y2="13" stroke="#00f0ff" stroke-width="1" opacity="0.8"/>

  <!-- Pulsing laser node -->
  <circle class="pulse-dot" cy="10" r="4" fill="#00f0ff" filter="url(#glow)"/>
</svg>
